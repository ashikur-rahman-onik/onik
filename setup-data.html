<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Setup Data</title>
<style>
body{background:#0f0e0c;color:#e8e0d0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#1a1814;border:1px solid #2e2b24;padding:2rem;max-width:500px;width:90%;text-align:center;}
h2{color:#e0a84e;margin-bottom:1rem;}
p{font-size:.85rem;color:#7a6f62;margin-bottom:1.5rem;line-height:1.8;}
button{padding:1rem 2rem;background:#c08b3a;color:#0f0e0c;border:none;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;}
button:hover{background:#e0a84e;}
button:disabled{opacity:.5;cursor:not-allowed;}
#status{margin-top:1rem;font-size:.8rem;line-height:2;text-align:left;}
.ok{color:#50c878;}
.err{color:#e05050;}
.info{color:#5090e0;}
</style>
</head>
<body>
<div class="box">
  <h2>Portfolio Data Setup</h2>
  <p>এই button চাপলে তোমার সব portfolio data Firebase-এ save হয়ে যাবে।<br>
  <strong style="color:#e0a84e">একবারই চাপো।</strong></p>
  <button id="btn" onclick="runSetup()">Firebase-এ Data Save করো</button>
  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDJfJEDyvpyBs0EGVNBxAsruaOrRQ7Lkmw",
  authDomain: "onik-portfolio-1d1bd.firebaseapp.com",
  databaseURL: "https://onik-portfolio-1d1bd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onik-portfolio-1d1bd",
  storageBucket: "onik-portfolio-1d1bd.firebasestorage.app",
  messagingSenderId: "134396301015",
  appId: "1:134396301015:web:32e149357af1b3ccb76a92"
});
const db = getDatabase(app);

function log(msg, type) {
  const d = document.getElementById('status');
  d.innerHTML += '<div class="' + (type||'ok') + '">' + msg + '</div>';
}

window.runSetup = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  document.getElementById('status').innerHTML = '';

  try {
    // HERO
    log('Hero section save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/hero'), {
      logoText: "A.Onik",
      logoImage: "",
      name: "MD. Ashikur Rahman Onik",
      title: "Computer Operator & Instructor · Natore, Bangladesh",
      description: "Detail-oriented professional with formal training in computer applications, documentation, and digital record management. BTEB certified. Passionate about precision.",
      email: "anikashikur51@gmail.com",
      whatsapp: "+880 1973 321755",
      linkedin: "https://linkedin.com/in/anikashikur51",
      facebook: "https://facebook.com/anikashikur51",
      location: "Bagatipara, Natore, Bangladesh",
      yearsExp: "5.0",
      badgeLabel: "GPA Score",
      eyebrow: "Office Administration & Data Support",
      btn1: "Get In Touch →",
      btn2: "View My Work",
      photo: ""
    });
    log('✅ Hero saved!');

    // ABOUT
    log('About section save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/about'), {
      para1: "A <b>detail-oriented Computer Operator & Instructor</b> based in Bagatipara, Natore — trained at BTEB-certified institutions with hands-on expertise in MS Office, document management, and digital workflows.",
      para2: "Beyond technical skills, I bring <b>patience and clarity</b> as a trainer — simplifying complex software for new learners. I believe every document, spreadsheet, and presentation reflects the care of its creator.",
      stats: [
        { value: "5.0", label: "SSC GPA" },
        { value: "A+",  label: "BTEB Grade" },
        { value: "360", label: "Training Hrs" },
        { value: "3+",  label: "Yrs Active" }
      ],
      tags: ["MS Office", "Data Entry", "Photoshop", "Training", "Bengali Typing", "English Typing"],
      infoRows: [
        { key: "Full Name", value: "MD. Ashikur Rahman Onik" },
        { key: "Email",     value: "anikashikur51@gmail.com" },
        { key: "WhatsApp",  value: "+880 1973 321755" },
        { key: "Location",  value: "Bagatipara, Natore, Bangladesh" },
        { key: "Status",    value: "Available for Work ✅" }
      ]
    });
    log('✅ About saved!');

    // EXPERIENCE
    log('Experience save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/experience'), [
      {
        role: "Computer Operator & Instructor",
        org: "Sabuj Computer Book Campus and Photostat",
        dateFrom: "July 2025",
        dateTo: "Present",
        location: "Natore, Bangladesh",
        points: [
          "High-speed typing for official documents, academic materials, and book layouts in Bengali and English.",
          "Regular training sessions for students on MS Word, Excel, and PowerPoint.",
          "Manage online applications, professional email correspondence, and digital file management.",
          "Oversee and maintain office equipment including photocopiers and scanners."
        ]
      },
      {
        role: "Computer Office Application Trainee",
        org: "Ferdoshi Computer Training Center",
        dateFrom: "July 2022",
        dateTo: "Dec 2022",
        location: "Rajshahi",
        points: [
          "Grade: A+ — BTEB Certified (National Skill Standard Basic, 360 Hours).",
          "Developed organized Excel sheets for record-keeping with formulas for data accuracy.",
          "Designed structured slide decks for academic and training presentations."
        ]
      }
    ]);
    log('✅ Experience saved!');

    // SKILLS
    log('Skills save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/skills'), [
      {
        category: "Computer Skills",
        items: ["MS Word", "MS Excel", "MS PowerPoint", "Adobe Photoshop", "Lightroom Classic"]
      },
      {
        category: "Office & Admin",
        items: ["Data Entry", "Email Communication", "Document Management", "Internet Research", "File Organization"]
      },
      {
        category: "Creative",
        items: ["Graphic Design", "Video Editing", "Photo Retouching", "Slide Design"]
      },
      {
        category: "Soft Skills",
        items: ["Communication", "Teamwork", "Time Management", "Quick Learner", "Accuracy & Discipline"]
      }
    ]);
    log('✅ Skills saved!');

    // EDUCATION
    log('Education save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/education'), [
      {
        degree: "Bachelor of Arts (B.A. Hons) — History",
        institution: "Rajshahi College · National University",
        year: "2024 – Present",
        gpa: "—",
        status: "Ongoing"
      },
      {
        degree: "Higher Secondary Certificate — Commerce",
        institution: "Rajshahi Govt. City College · Rajshahi Board",
        year: "2022 – 2024",
        gpa: "4.25",
        status: "GPA / 5.00"
      },
      {
        degree: "Secondary School Certificate — Science",
        institution: "Jigori High School · Rajshahi Board",
        year: "2020 – 2022",
        gpa: "5.00 ⭐",
        status: "Perfect GPA"
      }
    ]);
    log('✅ Education saved!');

    // CERTIFICATIONS
    log('Certifications save হচ্ছে...', 'info');
    await set(ref(db, 'portfolio/certifications'), [
      { icon: "🏅", name: "National Skill Standard Basic (360 Hrs)", issuer: "BTEB, Bangladesh" },
      { icon: "📷", name: "Adobe Photoshop Lightroom Classic",        issuer: "Mind Luster" },
      { icon: "📊", name: "Microsoft Excel Basics",                   issuer: "Robi 10 Minute School" },
      { icon: "📝", name: "CV Writing",                               issuer: "Robi 10 Minute School" },
      { icon: "🎬", name: "Basic Graphic Design & Video Editing",     issuer: "Shomvob Academy" },
      { icon: "💡", name: "Self-Confidence Technique",                issuer: "Shomvob Academy" }
    ]);
    log('✅ Certifications saved!');

    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
    log('✅ সব data Firebase-এ save হয়েছে!');
    log('এখন admin.html খোলো — সব data দেখাবে।');
    btn.textContent = '✅ Done!';

  } catch(e) {
    log('❌ Error: ' + e.message, 'err');
    btn.textContent = 'আবার চেষ্টা করো';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
